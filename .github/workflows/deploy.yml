name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # ou "master", dependendo de como você chama sua branch principal
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build Evidence
        run: |
          npm run sources
          npm run build
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # O caminho aqui DEVE ser o mesmo que você colocou no package.json
          path: './build/cesol-data-analysis' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4