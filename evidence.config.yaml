appearance:
  default: system
  switcher: true

theme:
  colorPalettes:
    default:
      light:
        - "#1F4E79"
        - "#2E6D9C"
        - "#4A89B8"
        - "#7BA7C7"
        - "#A7C4D9"
        - "#6E7F8D"
        - "#A6B3BE"
        - "#C8D1D8"
        - "#355C7D"
        - "#5A7D9A"
      dark:
        - "#4A89B8"
        - "#5F98C2"
        - "#7BA7C7"
        - "#A7C4D9"
        - "#C8D1D8"
        - "#8FA2B1"
        - "#B7C3CC"
        - "#D3DAE0"
        - "#6B93B5"
        - "#8BAFCC"
  colorScales:
    default:
      light:
        - "#ADD8E6"
        - "#00008B"
      dark:
        - "#ADD8E6"
        - "#00008B"
  colors:
    primary:
      light: "#2563eb"
      dark: "#3b82f6"
    accent:
      light: "#c2410c"
      dark: "#fdba74"
    base:
      light: "#ffffff"
      dark: "#09090b"
    info:
      light: "#0284c7"
      dark: "#38bdf8"
    positive:
      light: "#2E7D32"
      dark: "#66BB6A"
    warning:
      light: "#B7791F"
      dark: "#E6A23C"
    negative:
      light: "#C0392B"
      dark: "#E57373"

plugins:
  components:
    # This loads all of evidence's core charts and UI components
    # You probably don't want to edit this dependency unless you know what you are doing
    "@evidence-dev/core-components": {}

  datasources:
    # You can add additional datasources here by adding npm packages. 
    # Make to also add them to `package.json`.
    "@evidence-dev/bigquery": { }
    "@evidence-dev/csv": { }
    "@evidence-dev/databricks": { }
    "@evidence-dev/duckdb": { }
    "@evidence-dev/mssql": { }
    "@evidence-dev/mysql": { }
    "@evidence-dev/postgres": { }
    "@evidence-dev/source-javascript": { }
    "@evidence-dev/snowflake": { }
    "@evidence-dev/sqlite": { }
    "@evidence-dev/trino": { }
    "@evidence-dev/motherduck": { }

deployment:
  basePath: /cesol-data-analysis